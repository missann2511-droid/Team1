# Docker Compose (Checkpoint criterion W7.2)
# Runs the backend API and the Streamlit frontend together.
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: vehicle-price-backend:latest
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: /app/models/best/model_pipeline.joblib
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: vehicle-price-frontend:latest
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
